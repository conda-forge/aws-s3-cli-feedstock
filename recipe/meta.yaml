{% set name = "aws-s3-cli" %}
{% set version = "0.0.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 66429ff2b1e020e67783057bfe841c508dbfb303dd31180dab0c7ec5c2dbff00

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - boto3
    - python >={{ python_min }}

test:
  imports:
    - aws_s3_cli
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/sujitmandal/aws-s3-cli
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: upload, download, check file availability, and get all available list from AWS s3 bucket.
  doc_url: https://sujitmandal.github.io/aws-s3-cli/
  dev_url: https://github.com/sujitmandal/aws-s3-cli/

extra:
  recipe-maintainers:
    - sujitmandal
